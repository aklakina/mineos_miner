# MineOS Miner configuration.
# Lines look like `key = value`. Values are auto-numeric where possible.
# ---- Mining pattern ----
# One of: branch, strip, quarry, spiral
pattern = branch
# ---- Fuel ----
# Absolute floor below which we return even on short trips.
# The script ALSO always reserves enough fuel to return to base, computed
# from the current position; this only kicks in when you're near home.
fuelReturnThreshold = 100
# ---- Inventory cache ----
# Drop checkedBlocks entries farther than this many Manhattan blocks
# from the current position once per minute. Keeps memory bounded.
pruneRadius = 100
# ---- Corridor ----
# Set to 0 to skip 2-tall corridor digging (saves a small amount of fuel).
corridorTall = 1
# ---- Rednet ----
modemSide = left
# ---- Logging ----
# Default level for all components: TRACE DEBUG INFO WARN ERROR FATAL
log_default = INFO
# Per-component overrides (any number of these):
log_MinerCore    = INFO
log_BetterTurtle = WARN
log_Environment  = INFO
log_FSM          = INFO
log_Telemetry    = INFO
log_Logger       = WARN
